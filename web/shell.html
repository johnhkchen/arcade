<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Arcade cartridge</title>
  <style>
    :root { --bg:#faf8f5; --ink:#1c1917; --blue:#44679b; }
    html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
      font-family:-apple-system,system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
    body { display:flex; align-items:center; justify-content:center; }
    #frame { display:flex; flex-direction:column; align-items:center; gap:10px; padding:12px; }
    canvas.emscripten { display:block; border:0; border-radius:14px; max-width:100%;
      touch-action:none; -webkit-user-select:none; user-select:none;
      box-shadow:0 14px 30px -12px color-mix(in srgb, var(--ink) 30%, transparent); background:#161a22; }
    #tag { font-size:13px; color:#736b66; }
  </style>
</head>
<body>
  <div id="frame">
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="tag">b28 arcade</div>
  </div>
  <script>
    var Module = {
      canvas: (function () {
        var c = document.getElementById('canvas');
        c.addEventListener('webglcontextlost', function (e) { alert('WebGL context lost.'); e.preventDefault(); }, false);
        return c;
      })(),
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
