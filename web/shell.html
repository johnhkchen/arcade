<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Arcade cartridge</title>
  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#161a22; }
    canvas.emscripten {
      display:block; border:0; outline:none;
      width:100vw; height:100dvh;
      touch-action:none; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
    }
  </style>
</head>
<body>
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <script>
    var canvasEl = document.getElementById('canvas');
    function fit() {                       // match the drawing buffer to the CSS size
      canvasEl.width  = Math.floor(canvasEl.clientWidth);
      canvasEl.height = Math.floor(canvasEl.clientHeight);
    }
    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', function () { setTimeout(fit, 150); });
    fit();
    var Module = {
      canvas: canvasEl,
      onRuntimeInitialized: fit,
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
